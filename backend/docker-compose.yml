version: '3.8'

services:
  # PostgreSQL with TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: stockdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_password_here}
      POSTGRES_DB: StockDB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: stock_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend
  backend:
    build: .
    container_name: stock_backend
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-your_password_here}@db:5432/StockDB
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=production
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_USE_RELOADER=false
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - SCHEDULER_AUTO_CATCHUP=false
      - SCHEDULER_AUTO_TRAIN=false
      - SCHEDULER_IN_WEB_WORKER=false
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
